name: ZapClipper
options:
  bundleIdPrefix: com.zapclipper
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.4"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    CODE_SIGN_IDENTITY: "Apple Development"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: TQVHUV8MZY

packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.6.0"

schemes:
  ZapClipper:
    build:
      targets:
        ZapClipper: all
    run:
      config: Debug
    archive:
      config: Release

  ZapClipperExtension:
    build:
      targets:
        ZapClipperExtension: all
    run:
      config: Debug
      askForAppToLaunch: true

targets:
  ZapClipper:
    type: application
    platform: macOS
    sources:
      - path: ZapClipper
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.zapclipper.app
        PRODUCT_NAME: ZapClipper
        INFOPLIST_FILE: ZapClipper/Info.plist
        CODE_SIGN_ENTITLEMENTS: ZapClipper/ZapClipper.entitlements
        GENERATE_INFOPLIST_FILE: true
        MARKETING_VERSION: "1.2.1"
        CURRENT_PROJECT_VERSION: "4"
        INFOPLIST_KEY_CFBundleDisplayName: "ZapClipper"
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.utilities"
    dependencies:
      - target: ZapClipperExtension
      - package: Sparkle

  ZapClipperExtension:
    type: app-extension
    platform: macOS
    sources:
      - path: ZapClipperExtension
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.zapclipper.app.ZapClipperExtension
        PRODUCT_NAME: ZapClipperExtension
        INFOPLIST_FILE: ZapClipperExtension/Info.plist
        CODE_SIGN_ENTITLEMENTS: ZapClipperExtension/ZapClipperExtension.entitlements
        GENERATE_INFOPLIST_FILE: true
        MARKETING_VERSION: "1.2.1"
        CURRENT_PROJECT_VERSION: "4"
    dependencies:
      - sdk: MailKit.framework
