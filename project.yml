name: AntiOups
options:
  bundleIdPrefix: com.florianbonin
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.4"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    CODE_SIGN_IDENTITY: "Apple Development"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: TQVHUV8MZY

packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.6.0"

schemes:
  AntiOups:
    build:
      targets:
        AntiOups: all
    run:
      config: Debug
    archive:
      config: Release

  AntiOupsExtension:
    build:
      targets:
        AntiOupsExtension: all
    run:
      config: Debug
      askForAppToLaunch: true

targets:
  AntiOups:
    type: application
    platform: macOS
    sources:
      - path: AntiOups
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.florianbonin.AntiOups
        PRODUCT_NAME: Anti-Oups
        INFOPLIST_FILE: AntiOups/Info.plist
        CODE_SIGN_ENTITLEMENTS: AntiOups/AntiOups.entitlements
        GENERATE_INFOPLIST_FILE: true
        MARKETING_VERSION: "1.1"
        CURRENT_PROJECT_VERSION: "2"
        INFOPLIST_KEY_CFBundleDisplayName: "Anti-Oups"
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.utilities"
    dependencies:
      - target: AntiOupsExtension
      - package: Sparkle

  AntiOupsExtension:
    type: app-extension
    platform: macOS
    sources:
      - path: AntiOupsExtension
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.florianbonin.AntiOups.AntiOupsExtension
        PRODUCT_NAME: AntiOupsExtension
        INFOPLIST_FILE: AntiOupsExtension/Info.plist
        CODE_SIGN_ENTITLEMENTS: AntiOupsExtension/AntiOupsExtension.entitlements
        GENERATE_INFOPLIST_FILE: true
        MARKETING_VERSION: "1.1"
        CURRENT_PROJECT_VERSION: "2"
    dependencies:
      - sdk: MailKit.framework
